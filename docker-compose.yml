name: "dev-davidsilva-apps-playlists"

networks:
  app-network:
    name: dev-davidsilva-apps-playlists-network

volumes:
  database-data:
    name: dev-davidsilva-apps-playlists-db-data

services:
  database:
    image: "postgres:17.6-trixie"
    container_name: dev-davidsilva-apps-playlists-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "playlists"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - database-data:/var/lib/postgresql/data
    networks:
      - app-network

  swagger-ui:
    image: "swaggerapi/swagger-ui:latest"
    container_name: dev-davidsilva-apps-playlists-swagger
    ports:
      - "8081:8080"
    environment:
      # Points at the openapi.yaml served by the running Go server.
      # Start the server first, then open http://localhost:8081
      SWAGGER_JSON_URL: "http://localhost:8080/api/v1/openapi.yaml"
    networks:
      - app-network
